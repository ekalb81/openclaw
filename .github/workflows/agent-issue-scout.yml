name: Agent Issue Scout

on:
  workflow_dispatch:
  schedule:
    - cron: "13 10 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-scout-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scout:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "true"

      - name: Capture repo checks for snapshot
        shell: bash
        run: |
          set +e
          mkdir -p .local/issue-scout
          pnpm lint > .local/issue-scout/lint.txt 2>&1
          pnpm test > .local/issue-scout/test.txt 2>&1
          pnpm tsgo > .local/issue-scout/typecheck.txt 2>&1
          true

      - name: Generate repository snapshot
        run: node scripts/issue-scout/snapshot.mjs
        env:
          ISSUE_SCOUT_OUT_DIR: .local/issue-scout

      - name: Generate issue proposals
        run: node scripts/issue-scout/propose.mjs
        env:
          ISSUE_SCOUT_OUT_DIR: .local/issue-scout
          ISSUE_SCOUT_LLM_API_KEY: ${{ secrets.ISSUE_SCOUT_LLM_API_KEY }}
          ISSUE_SCOUT_LLM_BASE_URL: ${{ vars.ISSUE_SCOUT_LLM_BASE_URL }}
          ISSUE_SCOUT_LLM_MODEL: ${{ vars.ISSUE_SCOUT_LLM_MODEL }}
          ISSUE_SCOUT_MAX_PROPOSALS: ${{ vars.ISSUE_SCOUT_MAX_PROPOSALS }}

      - name: Create GitHub issues
        run: node scripts/issue-scout/create-issues.mjs
        env:
          ISSUE_SCOUT_OUT_DIR: .local/issue-scout
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload issue-scout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-scout-${{ github.run_id }}
          path: .local/issue-scout/
          if-no-files-found: ignore
          retention-days: 7
